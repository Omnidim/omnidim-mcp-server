startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - omnidimApiKey
    properties:
      omnidimApiKey:
        type: string
        description: Your OmniDimension API key. Get one at https://omnidim.io/api-management
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@omnidim-ai/mcp-server'],
      env: { OMNIDIM_API_KEY: config.omnidimApiKey },
    })
